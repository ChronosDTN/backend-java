server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:oracle:thin:@localhost:1521/CHRONOS_DB}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:system}
spring.datasource.password=${CHRONOS_DB_PASSWORD:ChronosSecurePassword2026}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:oracle.jdbc.OracleDriver}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.OracleDialect}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:none}

jwt.secret=${JWT_SECRET:ChronosDTNInterplanetaryKeySecure2026EncryptionSignatureHashHex}
jwt.expiration.ms=3600000

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html